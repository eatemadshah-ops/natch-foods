<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" fill="none">
  <!-- Background circle -->
  <circle cx="28" cy="28" r="27" fill="#1B3A2D"/>
  <!-- Gold outer ring -->
  <circle cx="28" cy="28" r="27" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
  <!-- Globe wireframe - subtle latitude/longitude hints -->
  <circle cx="28" cy="28" r="18" fill="none" stroke="#C9A84C" stroke-width="0.7" stroke-opacity="0.45"/>
  <ellipse cx="28" cy="28" rx="18" ry="7.5" fill="none" stroke="#C9A84C" stroke-width="0.7" stroke-opacity="0.4"/>
  <line x1="10" y1="28" x2="46" y2="28" stroke="#C9A84C" stroke-width="0.7" stroke-opacity="0.4"/>
  <line x1="28" y1="10" x2="28" y2="46" stroke="#C9A84C" stroke-width="0.7" stroke-opacity="0.4"/>
  <!-- Letter N - left bar -->
  <rect x="14" y="15" width="6" height="26" rx="0.5" fill="#C9A84C"/>
  <!-- Letter N - right bar -->
  <rect x="36" y="15" width="6" height="26" rx="0.5" fill="#C9A84C"/>
  <!-- Letter N - diagonal stroke -->
  <polygon points="20,15 26,15 36,41 30,41" fill="#C9A84C"/>
</svg>
